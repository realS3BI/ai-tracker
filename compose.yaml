services:
  ai-cost:
    build:
      context: .
      secrets:
        - build_env
    restart: unless-stopped
    init: true
    env_file:
      - .env.prod
    environment:
      APP_DATA_DIR: /data
    ports:
      - "${APP_BIND_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ai-cost-data:/data

volumes:
  ai-cost-data:

secrets:
  build_env:
    file: ${BUILD_ENV_FILE:-.env.prod}
