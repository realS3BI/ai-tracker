services:
  ai-cost:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_BIND_PORT:-3000}:3000"
    healthcheck:
      test: >-
        node -e "fetch('http://127.0.0.1:3000/api/health').then((response) =>
        process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
