services:
  ai-cost:
    build:
      context: .
      args:
        - NODE_ENV
        - HOST
        - PORT
        - OPENAI_API_KEY
        - OPENAI_ORG_ID
        - OPENAI_MONTHLY_BUDGET_USD
        - OPENROUTER_API_KEY
        - CODEX_HOME
        - CURSOR_DASHBOARD_COOKIE
        - CURSOR_TEAM_ID
        - APP_PASSWORD_HASH
        - APP_SESSION_SECRET
        - APP_TOKEN_SECRET
        - APP_SECURE_COOKIE
        - CLI_TOKEN_TTL_SECONDS
        - PROVIDER_TIMEOUT_MS
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      HOST: "${HOST:-0.0.0.0}"
      PORT: "${PORT:-3000}"
      APP_DATA_DIR: "/data"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_ORG_ID: "${OPENAI_ORG_ID:-}"
      OPENAI_MONTHLY_BUDGET_USD: "${OPENAI_MONTHLY_BUDGET_USD:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      CODEX_HOME: "${CODEX_HOME:-}"
      CURSOR_DASHBOARD_COOKIE: "${CURSOR_DASHBOARD_COOKIE:-}"
      CURSOR_TEAM_ID: "${CURSOR_TEAM_ID:-1}"
      APP_PASSWORD_HASH: "${APP_PASSWORD_HASH:-}"
      APP_SESSION_SECRET: "${APP_SESSION_SECRET:-}"
      APP_TOKEN_SECRET: "${APP_TOKEN_SECRET:-}"
      APP_SECURE_COOKIE: "${APP_SECURE_COOKIE:-true}"
      CLI_TOKEN_TTL_SECONDS: "${CLI_TOKEN_TTL_SECONDS:-2592000}"
      PROVIDER_TIMEOUT_MS: "${PROVIDER_TIMEOUT_MS:-10000}"
    ports:
      - "${APP_BIND_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ai-cost-data:/data

volumes:
  ai-cost-data:
