services:
  ai-cost:
    build:
      context: .
    restart: unless-stopped
    init: true
    env_file:
      - .env.prod
    ports:
      - "${APP_BIND_PORT:-3000}:${PORT:-3000}"
    volumes:
      - ai-cost-data:${APP_DATA_DIR:-/data}
    healthcheck:
      test: >-
        node -e "fetch('http://127.0.0.1:3000/api/health').then((response) =>
        process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  ai-cost-data:
